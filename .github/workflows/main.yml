name: 🤖 AI Trading Bot – Daily Live Run (ROBUST)

on:
  schedule:
    - cron: "0 17 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Trading mode"
        required: false
        default: "live"

permissions:
  contents: read

concurrency:
  group: trading-bot-live
  cancel-in-progress: false


# ============================================================
# 1) PREFLIGHT JOB (SAFE GATE)
# ============================================================
jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pytz python-dotenv

      # -----------------------------
      # SECRET VALIDATION
      # -----------------------------
      - name: 🔐 Validate secrets
        run: |
          python - <<'EOF'
          import os, sys

          required = [
              "OPENAI_API_KEY",
              "ALPACA_API_KEY",
              "ALPACA_SECRET_KEY",
              "ALLOW_LIVE_TRADING"
          ]

          missing = [k for k in required if not os.getenv(k)]

          if missing:
              print("❌ Missing:", missing)
              sys.exit(1)

          if os.getenv("ALLOW_LIVE_TRADING") != "true":
              print("❌ LIVE TRADING DISABLED")
              sys.exit(1)

          print("OK")
          EOF
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}

      # -----------------------------
      # ALPACA CHECK
      # -----------------------------
      - name: 🏥 Alpaca health check
        run: |
          python - <<'EOF'
          import os, requests, json

          headers = {
              "APCA-API-KEY-ID": os.getenv("ALPACA_API_KEY"),
              "APCA-API-SECRET-KEY": os.getenv("ALPACA_SECRET_KEY"),
          }

          r = requests.get("https://api.alpaca.markets/v2/account", headers=headers)

          if r.status_code != 200:
              raise SystemExit("API FAIL")

          data = r.json()

          if data.get("status") != "ACTIVE":
              raise SystemExit("NOT ACTIVE")

          if data.get("trading_blocked"):
              raise SystemExit("BLOCKED")

          print("SAFE")

          import os
          os.makedirs("runtime", exist_ok=True)

          with open("runtime/gate.json", "w") as f:
              json.dump({"safe_to_trade": True}, f)
          EOF

      # -----------------------------
      # UPLOAD GATE ARTIFACT
      # -----------------------------
      - name: 📦 Upload gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: gate
          path: runtime/gate.json


# ============================================================
# 2) TRADING JOB
# ============================================================
  trade:
    runs-on: ubuntu-latest
    needs: preflight

    # 🔥 IMPORTANT: NO OUTPUT DEPENDENCY (this fixes your null bug)
    if: success()

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📁 Create folders
        run: mkdir -p logs decisions runtime

      # -----------------------------
      # DOWNLOAD GATE (ROBUST STATE TRANSFER)
      # -----------------------------
      - name: 📥 Download preflight gate
        uses: actions/download-artifact@v4
        with:
          name: gate
          path: runtime

      - name: 🔍 Verify gate
        run: |
          python - <<'EOF'
          import json, sys

          with open("runtime/gate.json") as f:
              data = json.load(f)

          if not data.get("safe_to_trade"):
              print("❌ NOT SAFE")
              sys.exit(1)

          print("✅ SAFE TO TRADE")
          EOF

      # -----------------------------
      # TRADING EXECUTION
      # -----------------------------
      - name: 🤖 Run Trading Bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
          TRADING_MODE: live
          PYTHONUNBUFFERED: "1"
        run: |
          echo "🚀 Trading start"
          date -u

          python main.py --mode live 2>&1 | tee logs/run.log
          EXIT=$?

          echo "Exit: $EXIT"

          exit $EXIT

      # -----------------------------
      # SNAPSHOT
      # -----------------------------
      - name: 📊 Snapshot
        if: always()
        run: |
          python - <<'EOF'
          import json, datetime

          data = {
              "time": datetime.datetime.utcnow().isoformat(),
              "mode": "LIVE"
          }

          with open("logs/snapshot.json", "w") as f:
              json.dump(data, f, indent=2)

          print("snapshot ok")
          EOF

      # -----------------------------
      # ARTIFACTS
      # -----------------------------
      - name: 📦 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/

      - name: 📦 Upload decisions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decisions
          path: decisions/
