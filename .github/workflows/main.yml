name: 🤖 AI Trading Bot – Daily Live Run

on:
  schedule:
    - cron: "0 17 * * 1-5"   # 17:00 UTC / 19:00 CET
  workflow_dispatch:
    inputs:
      mode:
        description: "Trading mode"
        required: false
        default: "live"
        type: choice
        options: [live, paper]

permissions:
  contents: read

concurrency:
  group: trading-bot-live
  cancel-in-progress: false


# ============================================================
# PRE-FLIGHT CHECKS
# ============================================================
jobs:
  preflight:
    name: 🔍 Preflight Safety Checks
    runs-on: ubuntu-latest

    outputs:
      safe_to_trade: ${{ steps.gate.outputs.safe_to_trade }}
      market_status: ${{ steps.market.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pytz python-dotenv

      # -------------------------
      # SECRET CHECK (HARD GATE)
      # -------------------------
      - name: 🔐 Validate secrets
        run: |
          python - <<'EOF'
          import os, sys

          required = [
            "OPENAI_API_KEY",
            "ALPACA_API_KEY",
            "ALPACA_SECRET_KEY",
            "ALLOW_LIVE_TRADING"
          ]

          missing = [k for k in required if not os.getenv(k)]

          if missing:
              print("❌ Missing secrets:", missing)
              sys.exit(1)

          if os.getenv("ALLOW_LIVE_TRADING") != "true":
              print("❌ LIVE TRADING DISABLED")
              sys.exit(1)

          print("✅ Secrets OK")
          EOF
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}

      # -------------------------
      # MARKET STATUS
      # -------------------------
      - name: 🕐 Market check
        id: market
        run: |
          python - <<'EOF'
          from datetime import datetime, time
          import pytz, os

          now = datetime.now(pytz.timezone("America/New_York"))

          is_weekend = now.weekday() >= 5

          status = "OPEN" if not is_weekend else "CLOSED"

          print("Market:", status)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"status={status}\n")
          EOF

      # -------------------------
      # ALPACA HEALTH CHECK
      # -------------------------
      - name: 🏥 Alpaca check
        id: gate
        run: |
          python - <<'EOF'
          import os, requests, sys

          headers = {
              "APCA-API-KEY-ID": os.getenv("ALPACA_API_KEY"),
              "APCA-API-SECRET-KEY": os.getenv("ALPACA_SECRET_KEY"),
          }

          r = requests.get("https://api.alpaca.markets/v2/account", headers=headers)

          if r.status_code != 200:
              print("❌ Alpaca error")
              sys.exit(1)

          data = r.json()

          if data.get("status") != "ACTIVE":
              print("❌ Account not active")
              sys.exit(1)

          if data.get("trading_blocked"):
              print("❌ Trading blocked")
              sys.exit(1)

          print("✅ SAFE TO TRADE")

          # IMPORTANT FIX: always explicit output
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("safe_to_trade=true\n")
          EOF
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}


# ============================================================
# TRADING JOB
# ============================================================
  trade:
    name: 📈 Execute Trading Run
    runs-on: ubuntu-latest
    needs: preflight

    if: needs.preflight.outputs.safe_to_trade == 'true'

    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (safe)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📁 Create folders
        run: |
          mkdir -p logs decisions

      # -------------------------
      # MAIN TRADING EXECUTION
      # -------------------------
      - name: 🤖 Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
          TRADING_MODE: live
          PYTHONUNBUFFERED: "1"
        run: |
          echo "🚀 START TRADE"
          date -u

          python main.py --mode live 2>&1 | tee logs/run.log
          EXIT=$?

          echo "Exit code: $EXIT"

          if [ $EXIT -ne 0 ]; then
            echo "❌ Trading failed"
            exit $EXIT
          fi

      # -------------------------
      # SNAPSHOT
      # -------------------------
      - name: 📊 Portfolio snapshot
        if: always()
        run: |
          python - <<'EOF'
          import json, os
          from datetime import datetime

          data = {
              "time": datetime.utcnow().isoformat(),
              "mode": "LIVE"
          }

          with open("logs/snapshot.json", "w") as f:
              json.dump(data, f, indent=2)

          print("snapshot saved")
          EOF

      # -------------------------
      # ARTIFACTS
      # -------------------------
      - name: 📦 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs
          path: logs/

      - name: 📦 Upload decisions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-decisions
          path: decisions/
