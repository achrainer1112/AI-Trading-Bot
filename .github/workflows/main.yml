name: 🤖 AI Trading Bot – Daily Live Run

on:
  schedule:
    - cron: "0 17 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: trading-bot-live
  cancel-in-progress: false


# ============================================================
# GLOBAL ENV (fix Node warning optional)
# ============================================================
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:

# ============================================================
# 🔍 PREFLIGHT
# ============================================================
  preflight:
    runs-on: ubuntu-latest

    outputs:
      safe_to_trade: ${{ steps.gate.outputs.safe_to_trade }}
      market_status: ${{ steps.market.outputs.status }}

    steps:

      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------------------------------
      # 🔐 SECRET CHECK
      # --------------------------------------------------------
      - name: Secret Check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
        run: |
          python - <<'EOF'
          import os, sys

          required = [
            "OPENAI_API_KEY",
            "ALPACA_API_KEY",
            "ALPACA_SECRET_KEY",
            "ALLOW_LIVE_TRADING"
          ]

          missing = [k for k in required if not os.getenv(k)]

          if missing:
              print("❌ Missing:", missing)
              sys.exit(1)

          print("✅ Secrets OK")
          EOF

      # --------------------------------------------------------
      # 📊 MARKET STATUS
      # --------------------------------------------------------
      - name: Market Status
        id: market
        run: |
          echo "status=OPEN" >> $GITHUB_OUTPUT

      # --------------------------------------------------------
      # 🧠 SAFETY GATE (FIXED + NON-SECRET OUTPUT SAFE)
      # --------------------------------------------------------
      - name: Safety Gate
        id: gate
        env:
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
        run: |
          set -e

          echo "ALLOW_LIVE_TRADING=$ALLOW_LIVE_TRADING"

          if [[ "$ALLOW_LIVE_TRADING" != "true" ]]; then
            echo "safe_to_trade=false" >> "$GITHUB_OUTPUT"
            echo "❌ LIVE TRADING DISABLED"
            exit 0
          fi

          printf "safe_to_trade=true\n" >> "$GITHUB_OUTPUT"
          echo "✅ SAFE TO TRADE"

      # --------------------------------------------------------
      # 🧪 DEBUG OUTPUTS (IMPORTANT)
      # --------------------------------------------------------
      - name: Debug Outputs
        run: |
          echo "market=${{ steps.market.outputs.status }}"
          echo "gate=${{ steps.gate.outputs.safe_to_trade }}"
          cat $GITHUB_OUTPUT || true


# ============================================================
# 📈 TRADING
# ============================================================
  trade:
    runs-on: ubuntu-latest
    needs: preflight

    # 🔥 NULL-SAFE CONDITION (THIS FIXES YOUR BUG)
    if: ${{ needs.preflight.outputs.safe_to_trade == 'true' }}

    timeout-minutes: 30

    steps:

      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create folders
        run: mkdir -p logs decisions

      # --------------------------------------------------------
      # 🚀 RUN BOT
      # --------------------------------------------------------
      - name: Execute Trading Bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
          TRADING_MODE: live
        run: |
          echo "🚀 START TRADING"
          python main.py --mode live 2>&1 | tee logs/run.log

      # --------------------------------------------------------
      # 📦 LOGGING
      # --------------------------------------------------------
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/

      - name: Upload Decisions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decisions
          path: decisions/


# ============================================================
# 📋 AUDIT SKIP
# ============================================================
  audit:
    runs-on: ubuntu-latest
    needs: preflight

    if: needs.preflight.outputs.safe_to_trade != 'true'

    steps:
      - name: Skip Log
        run: |
          echo "⏭ SKIPPED"
          echo "market=${{ needs.preflight.outputs.market_status }}"
          echo "safe=${{ needs.preflight.outputs.safe_to_trade }}"
