name: 🤖 AI Trading Bot – Daily Live Run

on:
  schedule:
    - cron: "0 17 * * 1-5"   # 17:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        default: live
        type: choice
        options: [live, paper]

permissions:
  contents: read
  actions: write

concurrency:
  group: trading-bot-live
  cancel-in-progress: false


jobs:

# ============================================================
# 🔍 PREFLIGHT SAFETY CHECKS
# ============================================================
  preflight:
    name: 🔍 Preflight Safety Checks
    runs-on: ubuntu-latest

    outputs:
      safe_to_trade: ${{ steps.gate.outputs.safe_to_trade }}
      market_status: ${{ steps.market.outputs.status }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------------------------------
      # 🔐 SECRET CHECK (DEBUG SAFE)
      # --------------------------------------------------------
      - name: Validate secrets
        id: secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
        run: |
          python - <<'EOF'
          import os, sys

          required = [
            "OPENAI_API_KEY",
            "ALPACA_API_KEY",
            "ALPACA_SECRET_KEY",
            "ALLOW_LIVE_TRADING"
          ]

          missing = [k for k in required if not os.getenv(k)]

          if missing:
              print("❌ Missing:", missing)
              sys.exit(1)

          print("✅ Secrets OK")
          EOF

      # --------------------------------------------------------
      # 📊 MARKET STATUS
      # --------------------------------------------------------
      - name: Market status
        id: market
        run: |
          echo "status=OPEN" >> $GITHUB_OUTPUT

      # --------------------------------------------------------
      # 🏥 SAFETY GATE (CRITICAL FIX HERE)
      # --------------------------------------------------------
      - name: Safety Gate
        id: gate
        env:
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
        run: |
          python - <<'EOF'
          import os

          allow = os.getenv("ALLOW_LIVE_TRADING", "false").lower()

          if allow != "true":
              print("❌ LIVE TRADING DISABLED")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("safe_to_trade=false\n")
              exit(0)

          print("✅ SAFE TO TRADE")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("safe_to_trade=true\n")
          EOF


# ============================================================
# 📈 TRADING JOB
# ============================================================
  trade:
    name: 📈 Execute Trading Run
    runs-on: ubuntu-latest
    needs: preflight

    # 🔥 FIXED CONDITION (null-safe guard)
    if: needs.preflight.outputs.safe_to_trade == 'true'

    timeout-minutes: 30

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Create logs
        run: mkdir -p logs decisions

      # --------------------------------------------------------
      # 🚀 RUN BOT
      # --------------------------------------------------------
      - name: Execute Trading Bot
        run: |
          echo "STARTING TRADING RUN"
          python main.py --mode live 2>&1 | tee logs/run.log


      # --------------------------------------------------------
      # 📦 ARTIFACTS
      # --------------------------------------------------------
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/

      - name: Upload decisions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decisions
          path: decisions/


# ============================================================
# 📋 SKIP AUDIT (optional but good)
# ============================================================
  audit:
    name: 📋 Skip Audit
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.safe_to_trade != 'true'

    steps:
      - name: Log skip
        run: |
          echo "SKIPPED RUN"
          echo "safe_to_trade=${{ needs.preflight.outputs.safe_to_trade }}"
          echo "market=${{ needs.preflight.outputs.market_status }}"
