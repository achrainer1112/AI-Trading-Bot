name: 🤖 AI Trading Bot – Daily Run (STABLE)

on:
  schedule:
    - cron: "0 17 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trading-bot
  cancel-in-progress: false


# ============================================================
# 1) PREFLIGHT
# ============================================================
jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      safe_to_trade: ${{ steps.set_gate.outputs.safe_to_trade }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pytz python-dotenv

      # -------------------------
      # SECRET CHECK
      # -------------------------
      - name: 🔐 Secrets check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
        run: |
          python - <<'EOF'
          import os, sys

          keys = [
              "OPENAI_API_KEY",
              "ALPACA_API_KEY",
              "ALPACA_SECRET_KEY",
              "ALLOW_LIVE_TRADING"
          ]

          missing = [k for k in keys if not os.getenv(k)]

          if missing:
              print("❌ Missing:", missing)
              sys.exit(1)

          if os.getenv("ALLOW_LIVE_TRADING") != "true":
              print("❌ LIVE TRADING DISABLED")
              sys.exit(1)

          print("OK")
          EOF

      # -------------------------
      # ALPACA DEBUG (IMPORTANT FIX)
      # -------------------------
      - name: 🏥 Alpaca debug check
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python - <<'EOF'
          import os, requests, sys

          api_key = os.getenv("ALPACA_API_KEY")
          secret  = os.getenv("ALPACA_SECRET_KEY")

          print("KEY PRESENT:", bool(api_key))
          print("SECRET PRESENT:", bool(secret))

          # CHANGE THIS IF PAPER ACCOUNT
          url = "https://api.alpaca.markets/v2/account"

          headers = {
              "APCA-API-KEY-ID": api_key,
              "APCA-API-SECRET-KEY": secret,
          }

          r = requests.get(url, headers=headers, timeout=10)

          print("STATUS:", r.status_code)
          print("BODY:", r.text)

          if r.status_code != 200:
              sys.exit(1)

          data = r.json()

          if data.get("status") != "ACTIVE":
              sys.exit(1)

          if data.get("trading_blocked"):
              sys.exit(1)

          print("SAFE")
          EOF

      # -------------------------
      # WRITE GATE FILE (NO OUTPUTS EVER)
      # -------------------------
      - name: Create gate file
        run: |
          mkdir -p runtime
          echo '{"safe_to_trade": true}' > runtime/gate.json

      - name: Upload gate
        uses: actions/upload-artifact@v4
        with:
          name: gate
          path: runtime/gate.json

      # -------------------------
      # EXPORT JOB OUTPUT (for needs.*.outputs.safe_to_trade)
      # -------------------------
      - name: Set job output
        id: set_gate
        run: |
          if [ -f runtime/gate.json ]; then
            safe=$(python -c "import json,sys; data=json.load(open('runtime/gate.json')); print('true' if data.get('safe_to_trade') else 'false')")
          else
            safe=false
          fi
          echo "safe_to_trade=$safe" >> $GITHUB_OUTPUT


# ============================================================
# 2) TRADING JOB
# ============================================================
  trade:
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.result == 'success'

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create folders
        run: mkdir -p logs decisions runtime

      # -------------------------
      # LOAD GATE (ROBUST)
      # -------------------------
      - name: Download gate
        uses: actions/download-artifact@v4
        with:
          name: gate
          path: runtime

      - name: Debug gate output
        run: |
          echo "preflight.safe_to_trade=${{ needs.preflight.outputs.safe_to_trade }}"

      - name: Verify gate
        run: |
          python - <<'EOF'
          import json, sys

          with open("runtime/gate.json") as f:
              data = json.load(f)

          if not data.get("safe_to_trade"):
              print("NOT SAFE")
              sys.exit(1)

          print("SAFE TO TRADE")
          EOF

      # -------------------------
      # TRADE EXECUTION
      # -------------------------
      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
          TRADING_MODE: live
          PYTHONUNBUFFERED: "1"
        run: |
          echo "START TRADE"
          date -u

          python main.py --mode live 2>&1 | tee logs/run.log
          EXIT=$?

          echo "EXIT CODE: $EXIT"
          exit $EXIT

      # -------------------------
      # SNAPSHOT
      # -------------------------
      - name: Snapshot
        if: always()
        run: |
          python - <<'EOF'
          import json, datetime

          data = {
              "time": datetime.datetime.utcnow().isoformat(),
              "mode": "LIVE"
          }

          with open("logs/snapshot.json", "w") as f:
              json.dump(data, f, indent=2)

          print("snapshot ok")
          EOF

      # -------------------------
      # ARTIFACTS
      # -------------------------
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/

      - name: Upload decisions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decisions
          path: decisions/
