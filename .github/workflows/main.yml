# ============================================================
# AI Trading Bot – GitHub Actions Workflow
# PHASE 4B: Full Automation via GitHub Actions
# ============================================================
# Schedule: Mon–Fri, 18:00 UTC (20:00 CET / 12:00 PM ET)
# This gives ~2h buffer after US market close (16:00 ET)
# ============================================================

name: 🤖 AI Trading Bot – Daily Live Run

on:
  schedule:
    # 18:00 UTC = 20:00 CET = 12:00 ET (post-close buffer)
    - cron: "0 18 * * 1-5"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Trading mode override"
        required: false
        default: "live"
        type: choice
        options:
          - live
          - paper
      dry_run:
        description: "Dry run (no real orders)"
        required: false
        default: false
        type: boolean

# ─────────────────────────────────────────────────────────────
# PERMISSIONS (minimal – read repo, write artifacts only)
# ─────────────────────────────────────────────────────────────
permissions:
  contents: read
  actions: write          # needed to upload artifacts

# ─────────────────────────────────────────────────────────────
# CONCURRENCY GUARD
# Prevent overlapping runs if a previous run is still active
# ─────────────────────────────────────────────────────────────
concurrency:
  group: trading-bot-live
  cancel-in-progress: false   # NEVER cancel a live trading run

jobs:

  # ───────────────────────────────────────────────────────────
  # JOB 1: PREFLIGHT CHECKS
  # Validates secrets, market status, and system health
  # before any trading code is allowed to run.
  # ───────────────────────────────────────────────────────────
  preflight:
    name: 🔍 Preflight Safety Checks
    runs-on: ubuntu-latest
    outputs:
      safe_to_trade: ${{ steps.gate.outputs.safe_to_trade }}
      market_status: ${{ steps.market.outputs.status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal dependencies for preflight
        run: |
          pip install --quiet requests pytz python-dotenv

      - name: ✅ Validate required secrets
        id: secrets_check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
        run: |
          python - <<'EOF'
          import os, sys

          missing = []
          required = {
              "OPENAI_API_KEY":     os.getenv("OPENAI_API_KEY", ""),
              "ALPACA_API_KEY":     os.getenv("ALPACA_API_KEY", ""),
              "ALPACA_SECRET_KEY":  os.getenv("ALPACA_SECRET_KEY", ""),
              "ALLOW_LIVE_TRADING": os.getenv("ALLOW_LIVE_TRADING", ""),
          }

          for key, val in required.items():
              if not val or val.strip() == "":
                  missing.append(key)

          if missing:
              print(f"❌ ABORT: Missing required secrets: {', '.join(missing)}")
              print("Set all required secrets in: Settings → Secrets → Actions")
              sys.exit(1)

          if required["ALLOW_LIVE_TRADING"].strip().lower() != "true":
              print("❌ ABORT: ALLOW_LIVE_TRADING secret is not set to 'true'")
              print("This is a hard safety gate. Set ALLOW_LIVE_TRADING=true to proceed.")
              sys.exit(1)

          print("✅ All required secrets present and valid.")
          EOF

      - name: 🕐 Check US market status
        id: market
        run: |
          python - <<'EOF'
          import pytz, json
          from datetime import datetime, time

          eastern = pytz.timezone("America/New_York")
          now = datetime.now(eastern)
          weekday = now.weekday()   # 0=Mon, 6=Sun
          t = now.time()

          is_weekend = weekday >= 5
          market_was_open_today = (
              not is_weekend and
              t >= time(9, 30)   # We run after close so just check it opened
          )

          status = "CLOSED_WEEKEND" if is_weekend else (
              "CLOSED_HOLIDAY"   if not market_was_open_today else
              "CLOSED_POST"      if t > time(16, 0) else
              "OPEN"
          )

          print(f"Market status: {status}")
          print(f"Current ET time: {now.strftime('%Y-%m-%d %H:%M:%S %Z')}")

          # Write to GITHUB_OUTPUT
          import os
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"status={status}\n")

          # Abort if weekend (cron shouldn't fire, but belt-and-suspenders)
          if is_weekend:
              print("⚠️  Market is closed (weekend). Aborting run safely.")
              import sys; sys.exit(0)    # EXIT 0 = no failure, just skip

          print("✅ Market was open today – proceeding.")
          EOF

      - name: 🏥 System health gate
        id: gate
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          python - <<'EOF'
          import os, requests, sys

          api_key    = os.getenv("ALPACA_API_KEY", "")
          secret_key = os.getenv("ALPACA_SECRET_KEY", "")
          base_url   = "https://api.alpaca.markets"

          headers = {
              "APCA-API-KEY-ID":     api_key,
              "APCA-API-SECRET-KEY": secret_key,
          }

          # Test Alpaca connectivity
          try:
              resp = requests.get(f"{base_url}/v2/account", headers=headers, timeout=10)
              if resp.status_code == 200:
                  account = resp.json()
                  status  = account.get("status", "UNKNOWN")
                  blocked = account.get("trading_blocked", True)
                  equity  = float(account.get("equity", 0))

                  print(f"Alpaca account status : {status}")
                  print(f"Trading blocked       : {blocked}")
                  print(f"Equity                : ${equity:,.2f}")

                  if status != "ACTIVE":
                      print(f"❌ ABORT: Alpaca account status is '{status}', expected ACTIVE.")
                      sys.exit(1)

                  if blocked:
                      print("❌ ABORT: Trading is blocked on this account.")
                      sys.exit(1)

                  print("✅ Alpaca account healthy.")
              else:
                  print(f"❌ ABORT: Alpaca API returned {resp.status_code}: {resp.text[:200]}")
                  sys.exit(1)

          except requests.exceptions.RequestException as e:
              print(f"❌ ABORT: Cannot reach Alpaca API: {e}")
              sys.exit(1)

          # Write gate output
          import os as _os
          with open(_os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("safe_to_trade=true\n")
          EOF

  # ───────────────────────────────────────────────────────────
  # JOB 2: LIVE TRADING RUN
  # Only executes if preflight passes all gates.
  # ───────────────────────────────────────────────────────────
  trade:
    name: 📈 Execute Daily Trading Run
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.safe_to_trade == 'true'
    timeout-minutes: 30      # Hard kill after 30min (stuck trade guard)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📁 Create log directories
        run: mkdir -p logs decisions

      - name: 🤖 Run Trading Bot
        id: trading_run
        env:
          # Core API Keys (from GitHub Secrets)
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}

          # Live Trading Gate (must be 'true')
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
          TRADING_MODE:       live
          ALPACA_BASE_URL:    https://api.alpaca.markets

          # Risk settings
          KILL_SWITCH_DRAWDOWN_PCT: "0.08"

          # Runtime flags
          PYTHONUNBUFFERED: "1"
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          echo "🚀 Starting trading run at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Mode: LIVE | Alpaca: https://api.alpaca.markets"
          echo "─────────────────────────────────────────────"

          # Run with timeout (belt-and-suspenders alongside job timeout)
          timeout 1500 python main.py --mode live 2>&1 | tee logs/run_$(date +%Y%m%d_%H%M%S).log
          EXIT_CODE=${PIPESTATUS[0]}

          echo "─────────────────────────────────────────────"
          echo "Trading run finished with exit code: $EXIT_CODE"

          # Exit 0 on timeout or expected controlled exit
          if [ $EXIT_CODE -eq 124 ]; then
            echo "⚠️  Trading run timed out (1500s) – this is a safety limit."
            exit 1
          fi

          exit $EXIT_CODE

      - name: 📊 Capture portfolio snapshot
        if: always()
        run: |
          python - <<'EOF'
          import json, os
          from datetime import datetime

          snapshot = {
              "run_timestamp": datetime.utcnow().isoformat() + "Z",
              "run_date":      datetime.utcnow().strftime("%Y-%m-%d"),
              "workflow":      "trading-bot",
              "mode":          "LIVE",
          }

          # Try to enrich from portfolio.json if it exists
          try:
              with open("portfolio.json") as f:
                  pf = json.load(f)
              snapshot.update({
                  "cash":           pf.get("cash", 0),
                  "positions_count": len(pf.get("positions", {})),
                  "tickers":        list(pf.get("positions", {}).keys()),
              })
          except Exception:
              pass

          out_path = "logs/snapshot_latest.json"
          with open(out_path, "w") as f:
              json.dump(snapshot, f, indent=2)
          print(f"Snapshot saved: {out_path}")
          EOF

      - name: 📦 Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            logs/
            portfolio.json
          retention-days: 90
          if-no-files-found: warn

      - name: 📦 Upload decisions as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-decisions-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            decisions/
            logs/journal.json
          retention-days: 90
          if-no-files-found: warn

      # ── Optional: Slack/email notification on failure ──────
      # Uncomment and configure SLACK_WEBHOOK_URL secret to enable
      #
      # - name: 🔔 Notify on failure
      #   if: failure()
      #   uses: slackapi/slack-github-action@v1.27.0
      #   with:
      #     payload: |
      #       {
      #         "text": "❌ Trading Bot FAILED on ${{ github.run_id }}",
      #         "attachments": [{
      #           "color": "danger",
      #           "fields": [
      #             {"title": "Run", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
      #           ]
      #         }]
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #     SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ───────────────────────────────────────────────────────────
  # JOB 3: SKIPPED RUN AUDIT
  # Logs a record whenever trading is intentionally skipped
  # so the audit trail is always complete.
  # ───────────────────────────────────────────────────────────
  audit-skip:
    name: 📋 Audit – Skipped Run
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.safe_to_trade != 'true'

    steps:
      - name: Log skip reason
        run: |
          echo "⏭️  Trading run was skipped."
          echo "Market status : ${{ needs.preflight.outputs.market_status }}"
          echo "Safe to trade : ${{ needs.preflight.outputs.safe_to_trade }}"
          echo "This is expected on weekends, holidays, or when safety gates fire."
          echo "No trades were executed. No errors."
