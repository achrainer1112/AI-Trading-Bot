name: 🤖 AI Trading Bot – Daily Live Run

on:
  schedule:
    - cron: "0 17 * * 1-5"   # 17:00 UTC (CET offset)
  workflow_dispatch:
    inputs:
      mode:
        default: live
        type: choice
        options: [live, paper]

permissions:
  contents: read
  actions: write

concurrency:
  group: trading-bot-live
  cancel-in-progress: false


# ============================================================
# 🔍 PREFLIGHT JOB
# ============================================================
jobs:

  preflight:
    runs-on: ubuntu-latest

    outputs:
      safe_to_trade: ${{ steps.gate.outputs.safe_to_trade }}
      market_status: ${{ steps.market.outputs.status }}

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------------------------------
      # 🔐 SECRET CHECK
      # --------------------------------------------------------
      - name: Validate Secrets
        run: |
          python - <<'EOF'
          import os, sys

          required = [
            "OPENAI_API_KEY",
            "ALPACA_API_KEY",
            "ALPACA_SECRET_KEY",
            "ALLOW_LIVE_TRADING"
          ]

          missing = [k for k in required if not os.getenv(k)]

          if missing:
              print("❌ Missing secrets:", missing)
              sys.exit(1)

          print("✅ Secrets OK")
          EOF
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}

      # --------------------------------------------------------
      # 📊 MARKET STATUS
      # --------------------------------------------------------
      - name: Market Status
        id: market
        run: |
          echo "status=OPEN" >> $GITHUB_OUTPUT

      # --------------------------------------------------------
      # 🧠 SAFETY GATE (FIXED - NO PYTHON, NO FAILURES)
      # --------------------------------------------------------
      - name: Safety Gate
        id: gate
        env:
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
        run: |
          echo "DEBUG: ALLOW_LIVE_TRADING=$ALLOW_LIVE_TRADING"

          if [[ "$ALLOW_LIVE_TRADING" != "true" ]]; then
            echo "safe_to_trade=false" >> $GITHUB_OUTPUT
            echo "❌ LIVE TRADING DISABLED"
            exit 0
          fi

          echo "safe_to_trade=true" >> $GITHUB_OUTPUT
          echo "✅ SAFE TO TRADE"

      # --------------------------------------------------------
      # 🧪 DEBUG OUTPUT CHECK (IMPORTANT)
      # --------------------------------------------------------
      - name: Debug Outputs
        run: |
          echo "market=${{ steps.market.outputs.status }}"
          echo "gate=${{ steps.gate.outputs.safe_to_trade }}"


# ============================================================
# 📈 TRADING JOB
# ============================================================
  trade:
    runs-on: ubuntu-latest
    needs: preflight

    # 🔥 NULL-SAFE CONDITION (important fix)
    if: ${{ needs.preflight.outputs.safe_to_trade == 'true' }}

    timeout-minutes: 30

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create Folders
        run: mkdir -p logs decisions

      # --------------------------------------------------------
      # 🚀 RUN BOT
      # --------------------------------------------------------
      - name: Execute Trading Bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
          TRADING_MODE: live
        run: |
          echo "🚀 START TRADING RUN"
          python main.py --mode live 2>&1 | tee logs/run.log

      # --------------------------------------------------------
      # 📦 LOGS
      # --------------------------------------------------------
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/

      - name: Upload Decisions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decisions
          path: decisions/


# ============================================================
# 📋 AUDIT SKIP JOB
# ============================================================
  audit:
    runs-on: ubuntu-latest
    needs: preflight

    if: needs.preflight.outputs.safe_to_trade != 'true'

    steps:
      - name: Log Skip
        run: |
          echo "⏭ SKIPPED RUN"
          echo "market=${{ needs.preflight.outputs.market_status }}"
          echo "safe=${{ needs.preflight.outputs.safe_to_trade }}"
