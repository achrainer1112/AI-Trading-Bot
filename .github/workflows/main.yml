name: 🤖 AI Trading Bot – Daily Live Run

on:
  schedule:
    - cron: "0 17 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: trading-bot-live
  cancel-in-progress: false


jobs:

# ============================================================
# 🔍 PREFLIGHT
# ============================================================
  preflight:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------------------------------
      # 🔐 SECRET CHECK (NO OUTPUTS)
      # --------------------------------------------------------
      - name: Secret Check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
        run: |
          python - <<'EOF'
          import os, sys

          required = [
              "OPENAI_API_KEY",
              "ALPACA_API_KEY",
              "ALPACA_SECRET_KEY",
              "ALLOW_LIVE_TRADING"
          ]

          missing = [k for k in required if not os.getenv(k)]

          if missing:
              print("❌ Missing secrets:", missing)
              sys.exit(1)

          print("✅ Secrets OK")
          EOF

      # --------------------------------------------------------
      # 🧠 SAFETY GATE (FILE BASED - NO OUTPUTS)
      # --------------------------------------------------------
      - name: Safety Gate (create state file)
        run: |
          mkdir -p runtime

          if [ "${{ secrets.ALLOW_LIVE_TRADING }}" = "true" ]; then
            echo "true" > runtime/safe_to_trade.txt
            echo "✅ SAFE TO TRADE"
          else
            echo "false" > runtime/safe_to_trade.txt
            echo "❌ LIVE TRADING DISABLED"
          fi

      # --------------------------------------------------------
      # 🧪 DEBUG
      # --------------------------------------------------------
      - name: Debug State
        run: |
          echo "STATE:"
          cat runtime/safe_to_trade.txt


# ============================================================
# 📈 TRADING JOB
# ============================================================
  trade:
    runs-on: ubuntu-latest
    needs: preflight

    # 🔥 FILE-BASED CONDITION (NO NULL OUTPUT BUG EVER AGAIN)
    if: success()

    steps:

      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load safety state
        run: |
          cat runtime/safe_to_trade.txt

          if [ "$(cat runtime/safe_to_trade.txt)" != "true" ]; then
            echo "❌ NOT SAFE → EXIT"
            exit 0
          fi

          echo "✅ SAFE → CONTINUE"

      - name: Create folders
        run: mkdir -p logs decisions

      # --------------------------------------------------------
      # 🚀 RUN BOT
      # --------------------------------------------------------
      - name: Execute Trading Bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}
          TRADING_MODE: live
        run: |
          echo "🚀 START LIVE RUN"
          python main.py --mode live 2>&1 | tee logs/run.log

      # --------------------------------------------------------
      # 📦 ARTIFACTS
      # --------------------------------------------------------
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/

      - name: Upload Decisions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decisions
          path: decisions/


# ============================================================
# 📋 AUDIT SKIP
# ============================================================
  audit:
    runs-on: ubuntu-latest
    needs: preflight
    if: always()

    steps:
      - run: |
          echo "⏭ AUDIT LOG"
          echo "Workflow completed"
