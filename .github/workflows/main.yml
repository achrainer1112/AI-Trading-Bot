name: 🤖 AI Trading Bot – Daily Live Run (DEBUG MODE)

on:
  schedule:
    - cron: "0 17 * * 1-5"   # 17:00 UTC = 19:00 CET

  workflow_dispatch:
    inputs:
      mode:
        description: "Trading mode override"
        required: false
        default: "live"
        type: choice
        options:
          - live
          - paper
      dry_run:
        description: "Dry run (no real orders)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

concurrency:
  group: trading-bot-live
  cancel-in-progress: false

jobs:

# ============================================================
# PRE-FLIGHT SAFETY CHECKS
# ============================================================
  preflight:
    name: 🔍 Preflight Safety Checks
    runs-on: ubuntu-latest

    outputs:
      safe_to_trade: ${{ steps.gate.outputs.safe_to_trade }}
      market_status: ${{ steps.market.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pytz

# ---------------- DEBUG: SECRETS CHECK ----------------
      - name: 🔐 Validate Secrets
        run: |
          python - <<'EOF'
          import os, sys

          required = [
              "OPENAI_API_KEY",
              "ALPACA_API_KEY",
              "ALPACA_SECRET_KEY",
              "ALLOW_LIVE_TRADING"
          ]

          print("🔐 SECRET CHECK")
          missing = []

          for k in required:
              v = os.getenv(k, "")
              print(f"{k}: {'OK' if v else 'MISSING'}")
              if not v:
                  missing.append(k)

          if missing:
              print("❌ Missing:", missing)
              sys.exit(1)

          if os.getenv("ALLOW_LIVE_TRADING","").lower() != "true":
              print("❌ LIVE TRADING DISABLED")
              sys.exit(1)

          print("✅ Secrets OK")
          EOF
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}

# ---------------- MARKET CHECK ----------------
      - name: 🕐 Market Status Check
        id: market
        run: |
          python - <<'EOF'
          import pytz
          from datetime import datetime, time
          import os

          now = datetime.now(pytz.timezone("America/New_York"))
          weekday = now.weekday()

          if weekday >= 5:
              status = "CLOSED_WEEKEND"
          else:
              status = "OPEN"

          print("Market:", status)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"status={status}\n")

          EOF

# ---------------- ALPACA CHECK ----------------
      - name: 🏥 Alpaca Health Check
        id: gate
        run: |
          python - <<'EOF'
          import os, requests, sys

          headers = {
              "APCA-API-KEY-ID": os.getenv("ALPACA_API_KEY"),
              "APCA-API-SECRET-KEY": os.getenv("ALPACA_SECRET_KEY"),
          }

          try:
              r = requests.get("https://api.alpaca.markets/v2/account", headers=headers)

              if r.status_code != 200:
                  print("❌ Alpaca error")
                  sys.exit(1)

              data = r.json()
              print("Account:", data.get("status"))
              print("Blocked:", data.get("trading_blocked"))

              if data.get("status") != "ACTIVE":
                  sys.exit(1)

              if data.get("trading_blocked"):
                  sys.exit(1)

          except Exception as e:
              print("❌ Connection error:", e)
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("safe_to_trade=true\n")

          print("✅ SAFE TO TRADE")
          EOF
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

# ============================================================
# TRADE JOB
# ============================================================
  trade:
    name: 📈 Execute Daily Trading Run (DEBUG)
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.safe_to_trade == 'true'
    timeout-minutes: 30

    steps:

# ---------------- DEBUG ENTRY ----------------
      - name: 🧪 DEBUG ENTRY POINT
        run: |
          echo "=============================="
          echo "🚀 TRADE JOB STARTED"
          echo "safe_to_trade: ${{ needs.preflight.outputs.safe_to_trade }}"
          echo "market: ${{ needs.preflight.outputs.market_status }}"
          echo "time: $(date -u)"
          echo "=============================="

# ---------------- ENV DEBUG ----------------
      - name: 🔍 ENV CHECK
        run: |
          python - <<'EOF'
          import os

          keys = ["OPENAI_API_KEY","ALPACA_API_KEY","ALPACA_SECRET_KEY"]

          for k in keys:
              print(k, "=", "SET" if os.getenv(k) else "MISSING")
          EOF
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

# ---------------- SETUP ----------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create dirs
        run: mkdir -p logs decisions

# ---------------- RUN BOT ----------------
      - name: 🤖 Run Trading Bot
        run: |
          echo "🚀 Running bot..."

          timeout 1500 python main.py --mode live 2>&1 | tee logs/run.log
          EXIT=${PIPESTATUS[0]}

          echo "EXIT CODE: $EXIT"

          if [ $EXIT -eq 124 ]; then
            echo "TIMEOUT"
            exit 1
          fi

          exit $EXIT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALLOW_LIVE_TRADING: ${{ secrets.ALLOW_LIVE_TRADING }}

# ---------------- DEBUG OUTPUT ----------------
      - name: 📄 LAST LOG LINES
        if: always()
        run: tail -n 200 logs/run.log || true

# ---------------- SNAPSHOT ----------------
      - name: 📊 Portfolio Snapshot
        if: always()
        run: |
          python - <<'EOF'
          import json, datetime

          snap = {
              "time": str(datetime.datetime.utcnow()),
              "mode": "LIVE"
          }

          open("logs/snapshot.json","w").write(json.dumps(snap, indent=2))
          print("snapshot saved")
          EOF

# ---------------- ARTIFACTS ----------------
      - name: 📦 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-debug
          path: |
            logs/
            decisions/
          retention-days: 30

# ============================================================
# AUDIT SKIP JOB
# ============================================================
  audit-skip:
    name: 📋 Skip Audit
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.safe_to_trade != 'true'

    steps:
      - run: |
          echo "⏭ SKIPPED RUN"
          echo "market: ${{ needs.preflight.outputs.market_status }}"
          echo "safe: ${{ needs.preflight.outputs.safe_to_trade }}"
